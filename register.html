<section>

<h2>Register</h2>

<form>
<label>Unit Type</label>
<select id="unitType">
<option value="">Select Type</option>
<option value="V">Villa (V)</option>
<option value="R">Residential (R)</option>
<option value="D">Apartment Building (D)</option>
</select>

<label>Building / Unit</label>
<select id="unitNumber" name="UnitNumber">
<option value="">Select Unit</option>
</select>
<label id="subUnitLabel" style="display:none;">
Floor / Flat
</label>

<select id="subUnit" style="display:none;">
<option value="">Select</option>
</select>

<label>Username</label>
<input type="text" name="Username">

<label>Email Address</label>
<input type="email" name="Email">

<label>WhatsApp Number</label>
<input type="tel" name="WhatsApp">

<label>PIN Code</label>
<input type="password" name="PIN">


<button type="submit">Register</button>

</form>

</section>

<script>
document.querySelector("form").addEventListener("submit", function(e) {

e.preventDefault();

fetch("https://script.google.com/macros/s/AKfycbzGGFRUE5K1gtFKnmZbMvK-leYyLC0afG16AHpxe15WOtyOsnlMd0SFame5jjlmPCjr/exec", {
method: "POST",body: JSON.stringify({
action: "register",
UnitNumber:
(
unitType.value === "V"
?
unitNumber.value
:
unitNumber.value + "-" + subUnit.value
),
Username: document.querySelector('[name="Username"]').value,
WhatsApp: document.querySelector('[name="WhatsApp"]').value,
Email: document.querySelector('[name="Email"]').value,
PIN: document.querySelector('[name="PIN"]').value
})
})
.then(response => response.text())
.then(data => {
alert("Registration Successful");
document.querySelector("form").reset();
})
.catch(error => {
alert("Registration Failed");
});

});
</script>
<script>

const unitType = document.getElementById("unitType");
const unitNumber = document.getElementById("unitNumber");
const subUnit = document.getElementById("subUnit");
const subUnitLabel = document.getElementById("subUnitLabel");

unitType.addEventListener("change", function () {

unitNumber.innerHTML =
'<option value="">Select Unit</option>';

subUnit.innerHTML =
'<option value="">Select</option>';

subUnit.style.display = "none";
subUnitLabel.style.display = "none";

if (this.value === "V") {

for (let i = 1; i <= 20; i++) {

unitNumber.innerHTML +=
`<option value="V${i}">V${i}</option>`;

}

}

if (this.value === "R") {

for (let i = 1; i <= 20; i++) {

unitNumber.innerHTML +=
`<option value="R${i}">R${i}</option>`;

}

subUnit.style.display = "block";
subUnitLabel.style.display = "block";

subUnit.innerHTML +=
'<option value="G">Ground Floor</option>';

subUnit.innerHTML +=
'<option value="U">Upper Floor</option>';

}

if (this.value === "D") {

for (let i = 1; i <= 10; i++) {

unitNumber.innerHTML +=
`<option value="D${i}">D${i}</option>`;

}

subUnit.style.display = "block";
subUnitLabel.style.display = "block";

for (let i = 1; i <= 10; i++) {

const flat =
String(i).padStart(2,'0');

subUnit.innerHTML +=
`<option value="F${flat}">F${flat}</option>`;

}

}

});

</script>
</body>
