<section>

<h2>Register</h2>

<form>

<label>Unit Type</label>
<select>
<option>Villa (V)</option>
<option>Resident (R)</option>
<option>Building (D)</option>
</select>

<label>Unit Number</label>
<input type="text" name="UnitNumber" placeholder="R1, V1 or D1">


<label>Username</label>
<input type="text" name="Username">

<label>Email Address</label>
<input type="email" name="Email">

<label>WhatsApp Number</label>
<input type="tel" name="WhatsApp">

<label>PIN Code</label>
<input type="password" name="PIN">


<button type="submit">Register</button>

</form>

</section>

<script>
document.querySelector("form").addEventListener("submit", function(e) {

e.preventDefault();

fetch("https://script.google.com/macros/s/AKfycbzGGFRUE5K1gtFKnmZbMvK-leYyLC0afG16AHpxe15WOtyOsnlMd0SFame5jjlmPCjr/exec", {
method: "POST",body: JSON.stringify({
action: "register",
UnitNumber: document.querySelector('[name="UnitNumber"]').value,
Username: document.querySelector('[name="Username"]').value,
WhatsApp: document.querySelector('[name="WhatsApp"]').value,
Email: document.querySelector('[name="Email"]').value,
PIN: document.querySelector('[name="PIN"]').value
})
})
.then(response => response.text())
.then(data => {
alert("Registration Successful");
document.querySelector("form").reset();
})
.catch(error => {
alert("Registration Failed");
});

});
</script>

</body>
