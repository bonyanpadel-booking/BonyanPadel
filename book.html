<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Court</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<h1>Book Your Court</h1>
<p>Select your preferred time slot</p>
</header>

<nav>
<a href="index.html">Home</a>
<a href="register.html">Register</a>
<a href="login.html">Login</a>
<a href="dashboard.html">Dashboard</a>
<a href="book.html">Book Court</a>
<a href="schedule.html">Schedule</a>
<a href="mybookings.html">My Bookings</a>
<a href="openmatches.html">Open Matches</a>
<a href="rules.html">Rules</a>
<a href="privacy.html">Privacy</a>
<a href="contact.html">Contact</a>
<a href="admin.html">Admin</a>
</nav>

<section>

<h2>Reserve a Time</h2>

<form id="bookingForm">
<label>Booking Date</label>
<input type="date" name="BookingDate" required>

<label>Duration</label>
<select name="Duration">
<option>1 Hour</option>
<option>2 Hours</option>
</select>

<label>Time Slot</label>
<select name="TimeSlot">
<option>11:00 AM - 12:00 PM</option>
<option>12:00 PM - 1:00 PM</option>
<option>1:00 PM - 2:00 PM</option>
<option>2:00 PM - 3:00 PM</option>
<option>3:00 PM - 4:00 PM</option>
<option>4:00 PM - 5:00 PM</option>
<option>5:00 PM - 6:00 PM</option>
<option>6:00 PM - 7:00 PM</option>
<option>7:00 PM - 8:00 PM</option>
<option>8:00 PM - 9:00 PM</option>
<option>9:00 PM - 10:00 PM</option>
<option>10:00 PM - 11:00 PM</option>
</select>

<label>Match Type</label>
<select name="MatchType">
<option>Closed Match</option>
<option>Open Match</option>
</select>

<label>Notes (Optional)</label>
<input type="text" name="Notes" placeholder="Any notes">

<button type="submit">Book Now</button>

</form>

</section>

<footer>
<p>© 2026 Bonyan Padel. All rights reserved.</p>
</footer>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(e) {

e.preventDefault();

fetch("https://script.google.com/macros/s/AKfycbzGGFRUE5K1gtFKnmZbMvK-leYyLC0afG16AHpxe15WOtyOsnlMd0SFame5jjlmPCjr/exec", {
method: "POST",body: JSON.stringify({
action: "booking",

UnitNumber: localStorage.getItem("UnitNumber"),

BookingDate: document.querySelector('[name="BookingDate"]').value,

Duration: document.querySelector('[name="Duration"]').value,

TimeSlot: document.querySelector('[name="TimeSlot"]').value,

MatchType: document.querySelector('[name="MatchType"]').value,

Notes: document.querySelector('[name="Notes"]').value,

Status: "Approved"
})
})
.then(response => response.text())
.then(data => {

alert(data);

document.getElementById("bookingForm").reset();

})
});
</script>

</body>
</html>
