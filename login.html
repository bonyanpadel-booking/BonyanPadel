<section>

<h2>Login</h2>

<form id="loginForm">
<label>Unit Number</label>
<input type="text" name="UnitNumber" placeholder="R1, V1 or D1" required>

<label>PIN Code</label>
<input type="password" name="PIN" required>

<button type="submit">Login</button>
</form>
</section>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {

e.preventDefault();

fetch("https://script.google.com/macros/s/AKfycbzGGFRUE5K1gtFKnmZbMvK-leYyLC0afG16AHpxe15WOtyOsnlMd0SFame5jjlmPCjr/exec", {
method: "POST",
body: JSON.stringify({
action: "login",
UnitNumber: document.querySelector('[name="UnitNumber"]').value,
PIN: document.querySelector('[name="PIN"]').value
})
})
.then(response => response.text())
.then(data => {

if (data == "LOGIN_SUCCESS") {

alert("Login Successful");

window.location.href = "dashboard.html";

} else {

alert("Invalid Unit Number or PIN");

}

})
.catch(error => {
alert("Login Failed");
});

});
</script>
